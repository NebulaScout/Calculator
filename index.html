<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    <!-- TODO: Add a calc favicon -->
    <!-- TODO: Listen for keyboard press -->

    <div class="calc">
        <table border="5px">
            <!-- row-1 -->
            <tr class="row-1">
                <td class="display" rowspan="3" colspan="5">display</td>
            </tr>

            <tr></tr>   <!-- row-2 -->

            <tr></tr>   <!-- row-3 -->

            <!-- row-4 -->
            <tr class="row-4">
                <td class="open-()"><button>(</button></td>
                <td class="close-()"><button>)</button></td>
                <td class="cube-root"><button><sub>3</sub> &Sqrt;</button></td>
                <td class="del" rowspan="2"><button> Del<!--Del icon --> </button></td>
                <td class="clear" rowspan="2"><button>Clr</button></td>
            </tr>

            <!-- row-5 -->
            <tr class="row-5">
                <td class="sq-root"><button>
                    <math>
                        <msqrt><mi>x</mi></msqrt>
                    </math>
                </button></td>

                <td class="square-num"><button>
                    <math><mi>x</mi><sup>2</sup></math>
                </button></td>

                <td class="cube-num"><button>
                    <math><mi>x</mi><sup>3</sup></math>
                </button></td>
            </tr>

            <!-- row-6 -->
            <tr class="row-6">
                <td class="nine"><button>9</button></td>
                <td class="dot"><button>.</button></td>
                <td class="modulo"><button>mod</button></td>
                <td class="divide"><button>&divide</button></td>
                <td class="subtract"><button>-</button></td>
            </tr>

            <!-- row-7 -->
            <tr class="row-7">
                <td class="six"><button>6</button></td>
                <td class="seven"><button>7</button></td>
                <td class="eight"><button>8</button></td>
                <td class="product"><button>&times</button></td>
                <td class="add"><button>+</button></td>
            </tr>

            <!-- row-8 -->
            <tr class="row-8">
                <td class="three"><button>3</button></td>
                <td class="four"><button>4</button></td>
                <td class="five"><button>5</button></td>
                <td class="answer" rowspan="2"><button>Ans</button></td>
                <td class="equal-to" rowspan="2"><button>=</button></td>
            </tr>

            <!-- row-9 -->
            <tr class="row-9">
                <td class="zero"><button>0</button></td>
                <td class="one"><button>1</button></td>
                <td class="two"><button>2</button></td>
            </tr>

        </table>
    </div>
</body>
</html>
